<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CoralGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="text-center mb-4">
                <div class="auth-logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2 class="mt-3 fw-bold text-white">Welcome Back</h2>
                <p class="text-light-muted">Sign in to your CoralGuard account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-sm" role="alert">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label text-light">
                        <i class="fas fa-user me-1"></i> Username or Email
                    </label>
                    <input type="text" name="username" class="form-control glass-input"
                           placeholder="Enter username or email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-light">
                        <i class="fas fa-lock me-1"></i> Password
                    </label>
                    <div class="input-group">
                        <input type="password" name="password" id="loginPassword"
                               class="form-control glass-input" placeholder="Enter password" required>
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('loginPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" name="remember" id="remember">
                    <label class="form-check-label text-light" for="remember">Remember me</label>
                </div>
                <button type="submit" class="btn btn-glow w-100 py-2 mb-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
            <div class="text-center">
                <p class="text-light-muted mb-0">
                    Don't have an account?
                    <a href="{{ url_for('register') }}" class="text-primary fw-semibold">Register here</a>
                </p>
                <a href="{{ url_for('landing') }}" class="text-muted small">
                    <i class="fas fa-arrow-left me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
