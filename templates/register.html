<!-- templates/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CoralGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="text-center mb-4">
                <div class="auth-logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2 class="mt-3 fw-bold text-white">Create Account</h2>
                <p class="text-light-muted">Join CoralGuard to protect marine life</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-sm" role="alert">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label class="form-label text-light">
                        <i class="fas fa-id-card me-1"></i> Full Name
                    </label>
                    <input type="text" name="full_name" class="form-control glass-input"
                           placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-light">
                        <i class="fas fa-user me-1"></i> Username
                    </label>
                    <input type="text" name="username" class="form-control glass-input"
                           placeholder="Choose a username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-light">
                        <i class="fas fa-envelope me-1"></i> Email
                    </label>
                    <input type="email" name="email" class="form-control glass-input"
                           placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-light">
                        <i class="fas fa-lock me-1"></i> Password
                    </label>
                    <input type="password" name="password" id="regPassword"
                           class="form-control glass-input" placeholder="Min 6 characters" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-light">
                        <i class="fas fa-lock me-1"></i> Confirm Password
                    </label>
                    <input type="password" name="confirm_password" id="regConfirmPassword"
                           class="form-control glass-input" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="btn btn-glow w-100 py-2 mb-3">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>
            </form>
            <div class="text-center">
                <p class="text-light-muted mb-0">
                    Already have an account?
                    <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Login here</a>
                </p>
                <a href="{{ url_for('landing') }}" class="text-muted small">
                    <i class="fas fa-arrow-left me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
